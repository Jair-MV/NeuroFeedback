<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NeuroFeedback</title>

        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="css/style.css" />

        <script type="module" src="js/patients/index.js" defer></script>
    </head>

    <body>
        <header class="header">
            <form
                class="search-form u-display u-justify-content"
                style="--display-value: flex; --justify-c-value: center"
            >
                <input
                    class="search-form__input input"
                    type="text"
                    placeholder="Busca por nombre, teléfono o correo"
                />
                <button class="button button--icon">
                    <ion-icon name="search-outline"></ion-icon>
                </button>
            </form>
        </header>

        <main>
            <div class="container">
                <div
                    class="patients-list u-margin"
                    style="--margin-b-value: 5rem"
                ></div>

                <div
                    class="u-display u-justify-content"
                    style="
                        --display-value: flex;
                        --justify-c-value: space-between;
                    "
                >
                    <div class="pagination">
                        <button
                            id="buttonBackwards"
                            class="button button--icon"
                        >
                            <ion-icon name="arrow-back-outline"></ion-icon>
                        </button>

                        <div class="pagination__page-numbers"></div>

                        <button id="buttonForwards" class="button button--icon">
                            <ion-icon name="arrow-forward-outline"></ion-icon>
                        </button>
                    </div>

                    <a href="pages/form.html" class="button button--cta"
                        ><ion-icon name="person-add-outline"></ion-icon>
                        Agregar</a
                    >
                </div>
            </div>

            <div
                class="patient-overlay"
                data-state="closed"
                role="dialog"
                aria-modal="true"
            >
                <article class="patient-card patient-card--extended">
                    <header
                        class="patient-card__header u-display u-gap"
                        style="--display-value: flex; --gap-value: 2rem"
                    >
                        <img src="img/ui-face-1.jpg" alt="Patient photo" />

                        <div>
                            <p class="patient-card__name">Jair Montiel</p>
                            <p class="patient-card__gender">Hombre</p>
                        </div>

                        <p class="age">
                            <span>15</span>
                            <span>años</span>
                        </p>

                        <button
                            type="button"
                            class="patient-card__close"
                            aria-label="Cerrar"
                        >
                            ✕
                        </button>
                    </header>

                    <section class="patient-card__section">
                        <p class="patient-card__diagnosis">Ansiedad</p>
                    </section>

                    <section class="patient-card__section">
                        <h3 class="patient-card__section-title">
                            Motivo de consulta
                        </h3>
                        <p>
                            Presenta una constante falta de concentración en
                            clases.
                        </p>
                    </section>

                    <section class="patient-card__section">
                        <h3 class="patient-card__section-title">Tutor</h3>

                        <dl class="patient-card__list">
                            <div>
                                <dt>Nombre</dt>
                                <dd>Martha Leticia Villegas Aguilar</dd>
                            </div>
                            <div>
                                <dt>Parentesco</dt>
                                <dd>Madre</dd>
                            </div>
                        </dl>
                    </section>

                    <section class="patient-card__section">
                        <h3 class="patient-card__section-title">Contacto</h3>

                        <dl class="patient-card__list">
                            <div>
                                <dt>Teléfono</dt>
                                <dd>
                                    <a href="tel:5567297412">55 6729 7412</a>
                                </dd>
                            </div>
                            <div>
                                <dt>Correo</dt>
                                <dd>
                                    <a href="mailto:letyva71@gmail.com">
                                        letyva71@gmail.com
                                    </a>
                                </dd>
                            </div>
                        </dl>
                    </section>

                    <footer
                        class="patient-card__footer u-display u-gap"
                        style="--display-value: flex; --gap-value: 1rem"
                    >
                        <a href="#" class="button">
                            <ion-icon name="calendar-outline"></ion-icon>
                            Agendar
                        </a>

                        <a href="#" class="button">
                            <ion-icon name="create-outline"></ion-icon>
                            Editar
                        </a>
                    </footer>
                </article>
            </div>
        </main>

        <!-- Icons -->
        <script
            type="module"
            src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
        ></script>
        <script
            nomodule
            src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
        ></script>
    </body>
</html>
