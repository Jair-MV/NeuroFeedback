<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NeuroFeedback</title>

        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="css/style.css" />
    </head>

    <body>
        <header class="header">
            <form class="search-form">
                <input
                    type="text"
                    placeholder="Busca por nombre, teléfono o correo"
                />
                <button class="button button--icon">
                    <ion-icon name="search-outline"></ion-icon>
                </button>
            </form>
        </header>

        <main>
            <div class="container">
                <article class="patient-card">
                    <div
                        class="u-margin u-display u-gap"
                        style="
                            --margin-b-value: 2rem;
                            --display-value: flex;
                            --gap-value: 2rem;
                        "
                    >
                        <img src="img/ui-face-0.jpg" alt="Patient photo" />

                        <div>
                            <p class="patient-card__name">Nicolás Bautista</p>
                            <p class="patient-card__gender">Hombre</p>
                        </div>

                        <p class="age"><span>11</span><span>años</span></p>
                    </div>

                    <p class="patient-card__diagnosis">Dislexia</p>

                    <a
                        href="#"
                        class="u-margin button"
                        style="--margin-r-value: 1rem"
                        ><ion-icon name="calendar-outline"></ion-icon>Agendar</a
                    >
                    <a href="#" class="button"
                        ><ion-icon name="document-text-outline"></ion-icon
                        >Detalles</a
                    >
                </article>
            </div>
        </main>

        <!-- Icons -->
        <script
            type="module"
            src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
        ></script>
        <script
            nomodule
            src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
        ></script>
    </body>
</html>
