<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NeuroFeedback</title>

        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="css/style.css" />

        <script type="module" src="js/main.js" defer></script>
    </head>

    <body>
        <header class="header">
            <form class="search-form">
                <input
                    type="text"
                    placeholder="Busca por nombre, teléfono o correo"
                />
                <button class="button button--icon">
                    <ion-icon name="search-outline"></ion-icon>
                </button>
            </form>
        </header>

        <main>
            <div class="container">
                <div
                    class="patients-list u-margin"
                    style="--margin-b-value: 5rem"
                ></div>

                <div
                    class="u-display u-justify-content"
                    style="
                        --display-value: flex;
                        --justify-c-value: space-between;
                    "
                >
                    <div class="pagination">
                        <button
                            id="buttonBackwards"
                            class="button button--icon"
                        >
                            <ion-icon name="arrow-back-outline"></ion-icon>
                        </button>

                        <div class="pagination__page-numbers">
                            <div
                                data-pageNumber="0"
                                class="pagination__page-number pagination__page-number--active"
                            >
                                1
                            </div>
                            <div
                                data-pageNumber="1"
                                class="pagination__page-number"
                            >
                                2
                            </div>
                            <div
                                data-pageNumber="2"
                                class="pagination__page-number"
                            >
                                3
                            </div>
                            <div
                                data-pageNumber="3"
                                class="pagination__page-number"
                            >
                                4
                            </div>
                            <div
                                data-pageNumber="4"
                                class="pagination__page-number"
                            >
                                5
                            </div>
                        </div>

                        <button id="buttonForwards" class="button button--icon">
                            <ion-icon name="arrow-forward-outline"></ion-icon>
                        </button>
                    </div>

                    <a href="#" class="button button--cta"
                        ><ion-icon name="person-add-outline"></ion-icon>
                        Agregar</a
                    >
                </div>
            </div>
        </main>

        <!-- Icons -->
        <script
            type="module"
            src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
        ></script>
        <script
            nomodule
            src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
        ></script>
    </body>
</html>
